<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PDF Scanner logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2E86FF"/>
      <stop offset="0.55" stop-color="#1769FF"/>
      <stop offset="1" stop-color="#0B47C2"/>
    </linearGradient>
    <linearGradient id="page" x1="160" y1="150" x2="352" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8F0FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#06205C" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="#FFFFFF" opacity="0.05"/>

  <!-- Scan viewfinder corner brackets -->
  <g stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" opacity="0.92">
    <path d="M126 178 L126 146 Q126 126 146 126 L178 126"/>
    <path d="M386 178 L386 146 Q386 126 366 126 L334 126"/>
    <path d="M126 334 L126 366 Q126 386 146 386 L178 386"/>
    <path d="M386 334 L386 366 Q386 386 366 386 L334 386"/>
  </g>

  <!-- Document page with folded corner -->
  <g filter="url(#shadow)">
    <path d="M186 168 H300 L334 202 V356 Q334 366 324 366 H186 Q176 366 176 356 V178 Q176 168 186 168 Z" fill="url(#page)"/>
    <path d="M300 168 L334 202 H310 Q300 202 300 192 Z" fill="#BBD2FF"/>
  </g>

  <!-- Text lines on the document -->
  <g stroke="#2E86FF" stroke-width="14" stroke-linecap="round" opacity="0.55">
    <line x1="200" y1="236" x2="288" y2="236"/>
    <line x1="200" y1="268" x2="310" y2="268"/>
    <line x1="200" y1="300" x2="262" y2="300"/>
  </g>

  <!-- Accent scan line sweeping across the page -->
  <rect x="166" y="312" width="178" height="12" rx="6" fill="#FF7A1A"/>
  <rect x="166" y="312" width="178" height="12" rx="6" fill="#FF7A1A" opacity="0.35" filter="url(#shadow)"/>
</svg>
